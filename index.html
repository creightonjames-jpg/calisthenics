<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d10">
<title>Calisthenics</title>
<style>
  :root{
    --bg:#0d0d10; --panel:#18181c; --panel2:#222228; --line:#2e2e36;
    --text:#f4f4f6; --muted:#9a9aa6; --accent:#ff7d1a; --accent2:#ff9c45;
    --good:#ff7d1a; --warn:#ffb03a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  .app{max-width:520px;margin:0 auto;min-height:100vh;}
  header{position:sticky;top:0;z-index:20;background:rgba(15,23,41,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;}
  .hrow{display:flex;align-items:flex-start;gap:12px;}
  .menu-btn{background:none;border:none;color:var(--text);font-size:22px;line-height:1;
    padding:2px 4px;margin-top:1px;cursor:pointer;flex:none;}
  #hbar{flex:1;min-width:0;}
  .htitle{font-size:20px;font-weight:700;letter-spacing:.2px;}
  .hsub{font-size:12px;color:var(--muted);margin-top:2px;}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);
    font-size:15px;font-weight:600;background:none;border:none;padding:0;margin-bottom:8px;}
  main{padding:16px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:16px;margin-bottom:12px;}
  .daycard{display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;transition:transform .05s;}
  .daycard:active{transform:scale(.99);}
  .daynum{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .dayname{font-size:18px;font-weight:700;margin-top:3px;}
  .daydesc{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.4;}
  .chev{color:var(--muted);font-size:24px;}
  .rest{opacity:.55;}
  .rest .daynum{color:var(--muted);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
    background:var(--panel2);color:var(--muted);margin-left:6px;}
  .pill.done{background:rgba(62,203,143,.16);color:var(--good);}
  .ex-h{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .ex-hl{display:flex;align-items:center;gap:11px;min-width:0;}
  .ex-ico{width:42px;height:42px;flex:none;color:var(--accent);background:var(--panel2);
    border:1px solid var(--line);border-radius:11px;padding:5px;}
  .ex-ico svg{width:100%;height:100%;display:block;}
  .ex-name{font-size:16px;font-weight:700;line-height:1.3;}
  .ex-meta{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5;}
  .ex-note{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.5;
    padding-top:8px;border-top:1px dashed var(--line);}
  .badge{white-space:nowrap;font-size:12px;font-weight:700;color:var(--accent2);
    background:rgba(46,117,182,.14);padding:4px 10px;border-radius:10px;}
  .setrow{display:grid;grid-template-columns:34px 1fr 1fr 40px;gap:8px;align-items:center;margin-top:10px;}
  .setlbl{font-size:12px;color:var(--muted);font-weight:700;text-align:center;}
  .fieldwrap{position:relative;}
  .field{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-size:16px;font-weight:600;padding:11px 8px 11px 10px;text-align:center;
    -moz-appearance:textfield;}
  .field::-webkit-outer-spin-button,.field::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .field:focus{outline:none;border-color:var(--accent);}
  .field::placeholder{color:#5a6d8c;font-weight:500;}
  .funit{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);pointer-events:none;}
  .setcheck{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel2);color:var(--muted);font-size:16px;display:flex;align-items:center;
    justify-content:center;cursor:pointer;}
  .setcheck.on{background:var(--good);color:#06231a;border-color:var(--good);font-weight:800;}
  .fieldhead{display:grid;grid-template-columns:34px 1fr 1fr 40px;gap:8px;margin-top:12px;}
  .fieldhead span{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);
    text-align:center;font-weight:700;}
  .last{font-size:11.5px;color:var(--muted);margin-top:10px;font-style:italic;}
  .last b{color:var(--text);font-style:normal;}
  .btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;
    font-weight:700;cursor:pointer;margin-top:10px;}
  .btn-a{background:var(--accent);color:#fff;}
  .btn-g{background:var(--panel2);color:var(--text);border:1px solid var(--line);}
  .btn-sm{font-size:13px;padding:9px 12px;width:auto;display:inline-block;margin:0;}
  .ladder{margin-top:10px;}
  .ladder summary{font-size:13px;font-weight:700;color:var(--accent);cursor:pointer;padding:6px 0;list-style:none;}
  .ladder summary::-webkit-details-marker{display:none;}
  .ladder summary::before{content:"▸ ";}
  .ladder[open] summary::before{content:"▾ ";}
  .lrow{display:grid;grid-template-columns:26px 1fr auto;gap:8px;font-size:12.5px;
    padding:7px 0;border-bottom:1px solid var(--line);color:var(--muted);}
  .lrow b{color:var(--text);}
  .lstage{color:var(--accent2);font-weight:800;text-align:center;}
  .ladder-stage{margin-top:12px;}
  .ladder-stage label{font-size:10px;color:var(--muted);font-weight:700;display:block;
    margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;}
  .stagesel{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px;font-size:14px;font-weight:600;-webkit-appearance:none;appearance:none;}
  .stagesel:focus{outline:none;border-color:var(--accent);}
  /* rest timer */
  .timerbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--panel);
    border-top:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:none;align-items:center;gap:12px;max-width:520px;margin:0 auto;}
  .timerbar.show{display:flex;}
  .tdisplay{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;min-width:78px;}
  .tsub{font-size:11px;color:var(--muted);}
  .tbtns{margin-left:auto;display:flex;gap:8px;}
  .tbtn{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;}
  .tbtn.stop{background:var(--warn);color:#231705;border:none;}
  .toast{position:fixed;top:calc(env(safe-area-inset-top) + 12px);left:50%;transform:translateX(-50%);
    background:var(--good);color:#06231a;font-weight:700;font-size:13px;padding:10px 18px;
    border-radius:20px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .footwrap{text-align:center;padding:18px 16px 90px;color:var(--muted);font-size:11px;}
  .wipe{background:none;border:none;color:#5a6d8c;font-size:11px;text-decoration:underline;cursor:pointer;margin-top:6px;}
  .intro{font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 14px;}
  .overload{background:var(--panel2);border-radius:12px;padding:12px 14px;margin-top:4px;}
  .overload li{font-size:12.5px;color:var(--muted);margin:4px 0;line-height:1.4;}
  .overload b{color:var(--text);}
  /* drawer / nav */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;opacity:0;
    pointer-events:none;transition:opacity .2s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:270px;max-width:82%;background:var(--panel);
    border-right:1px solid var(--line);z-index:50;transform:translateX(-100%);
    transition:transform .22s ease;padding:calc(env(safe-area-inset-top) + 18px) 14px 18px;
    display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
  .drawer.show{transform:translateX(0);}
  .drawer-h{font-size:18px;font-weight:800;padding:4px 10px 6px;letter-spacing:.3px;}
  .drawer-sub{font-size:11px;color:var(--muted);padding:0 10px 12px;}
  .navitem{display:flex;align-items:center;gap:10px;background:none;border:none;color:var(--text);
    font-size:15px;font-weight:600;text-align:left;padding:13px 10px;border-radius:10px;
    cursor:pointer;width:100%;}
  .navitem:active{background:var(--panel2);}
  .navitem.active{background:var(--panel2);color:var(--accent);}
  .navitem .ni-ico{width:20px;text-align:center;font-size:16px;flex:none;}
  .soon-h{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.8px;padding:16px 10px 4px;}
  .soontag{margin-left:auto;font-size:9px;background:var(--panel2);color:var(--muted);
    padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
  /* calendar */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .calhead .m{font-size:17px;font-weight:800;}
  .calnav{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:9px;width:40px;height:40px;font-size:18px;font-weight:700;cursor:pointer;}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;}
  .caldow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);
    text-transform:uppercase;padding-bottom:2px;}
  .calcell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--muted);}
  .calcell .num{line-height:1;}
  .calcell.has{background:var(--panel2);color:var(--text);cursor:pointer;border:1px solid var(--line);}
  .calcell.has:active{transform:scale(.96);}
  .calcell.has.sel{border-color:var(--accent);background:rgba(79,140,255,.16);}
  .calcell.today .num{color:var(--accent);font-weight:800;}
  .caldot{width:6px;height:6px;border-radius:50%;background:var(--good);margin-top:4px;}
  .hist-hint{text-align:center;color:var(--muted);font-size:12.5px;padding:22px 12px;line-height:1.55;}
  .detdate{font-size:16px;font-weight:800;margin-bottom:6px;}
  .detday{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;
    letter-spacing:.6px;margin:14px 0 4px;}
  .detex{display:flex;justify-content:space-between;gap:12px;padding:8px 0;
    border-bottom:1px solid var(--line);font-size:13px;}
  .detex:last-child{border-bottom:none;}
  .detexn{font-weight:600;}
  .stg{font-size:10px;font-weight:700;color:var(--accent2);background:rgba(46,117,182,.16);
    padding:1px 6px;border-radius:8px;margin-left:6px;}
  .detexs{color:var(--muted);text-align:right;white-space:nowrap;}
  /* progress */
  .progsel{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:12px;font-size:15px;font-weight:600;margin-bottom:10px;
    -webkit-appearance:none;appearance:none;}
  .progsel:focus{outline:none;border-color:var(--accent);}
  .metricrow{display:flex;gap:8px;flex-wrap:wrap;}
  .mbtn{flex:1;min-width:78px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    border-radius:10px;padding:9px 6px;font-size:12.5px;font-weight:700;cursor:pointer;text-align:center;}
  .mbtn.on{background:rgba(79,140,255,.16);border-color:var(--accent);color:var(--accent);}
  .chartwrap{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:16px 14px 12px;margin-top:14px;}
  .progsum{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .progsum .big{font-size:30px;font-weight:800;line-height:1;}
  .progsum .unit{font-size:12.5px;color:var(--muted);font-weight:600;}
  .progsum .delta{font-size:12.5px;font-weight:700;margin-left:auto;}
  .delta.up{color:var(--good);} .delta.down{color:var(--warn);} .delta.flat{color:var(--muted);}
  .chart{width:100%;height:auto;display:block;margin-top:4px;}
  .ch-line{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round;}
  .ch-area{fill:rgba(79,140,255,.12);stroke:none;}
  .ch-dot{fill:var(--accent);}
  .ch-grid{stroke:var(--line);stroke-width:1;}
  .ch-lbl{fill:var(--muted);font-size:9px;}
  .ch-cap{text-align:center;color:var(--muted);font-size:11px;margin-top:8px;}
  .prog-note{font-size:12px;color:var(--muted);line-height:1.55;background:var(--panel2);
    border-radius:12px;padding:12px 14px;margin-top:14px;}
  .prog-note a{color:var(--accent);cursor:pointer;text-decoration:underline;}
  .prog-empty{text-align:center;color:var(--muted);font-size:13px;padding:48px 20px;line-height:1.6;}
  .prog-empty .pico{font-size:38px;margin-bottom:12px;}
  /* settings */
  .settings-field{margin-bottom:4px;}
  .settings-field label{font-size:13px;font-weight:700;display:block;margin-bottom:8px;}
  .settings-field .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.55;}
  .bwrow{display:flex;gap:10px;align-items:center;}
  .bwinput{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:12px;font-size:16px;font-weight:600;-moz-appearance:textfield;}
  .bwinput::-webkit-outer-spin-button,.bwinput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .bwinput:focus{outline:none;border-color:var(--accent);}
  .bwunit{font-size:14px;color:var(--muted);font-weight:700;}
  /* placeholder */
  .placeholder{text-align:center;padding:56px 22px;color:var(--muted);}
  .placeholder .pico{font-size:42px;margin-bottom:14px;}
  .placeholder h2{color:var(--text);font-size:19px;margin:0 0 8px;}
  .placeholder p{font-size:13.5px;line-height:1.55;margin:0 auto;max-width:300px;}
  /* ---- Ember theme polish (glow + warmth) ---- */
  body{background:radial-gradient(135% 55% at 50% -8%, rgba(255,125,26,.12), rgba(13,13,16,0) 55%), var(--bg);}
  header{background:rgba(13,13,16,.9);}
  .card{box-shadow:0 1px 0 rgba(255,255,255,.02) inset;}
  .badge{background:rgba(255,125,26,.14);color:var(--accent2);}
  .pill.done{background:rgba(255,125,26,.18);color:var(--accent);}
  .daynum{text-shadow:0 0 8px rgba(255,125,26,.35);}
  .btn-a{background:linear-gradient(135deg,#ff9a3c,#ff6a00);box-shadow:0 10px 28px rgba(255,110,0,.34);}
  .setcheck.on{color:#241200;box-shadow:0 0 14px rgba(255,125,26,.55);}
  .ex-ico{box-shadow:0 0 0 1px rgba(255,125,26,.14),0 4px 16px rgba(255,125,26,.12);}
  .calcell.has.sel{background:rgba(255,125,26,.16);border-color:var(--accent);}
  .calcell.today .num{text-shadow:0 0 10px rgba(255,125,26,.65);}
  .caldot{box-shadow:0 0 7px rgba(255,125,26,.75);}
  .mbtn.on{background:rgba(255,125,26,.16);}
  .stg{background:rgba(255,125,26,.16);color:var(--accent2);}
  .ch-area{fill:rgba(255,125,26,.14);}
  .ch-line{filter:drop-shadow(0 0 5px rgba(255,125,26,.55));}
  .ch-dot{filter:drop-shadow(0 0 4px rgba(255,125,26,.7));}
  .progsum .big{text-shadow:0 0 16px rgba(255,125,26,.42);}
  .toast{color:#2a1400;box-shadow:0 6px 20px rgba(255,125,26,.4);}
  .navitem.active{box-shadow:inset 0 0 0 1px rgba(255,125,26,.25);}
  .calnav:active,.tp:active{border-color:var(--accent);}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hrow">
      <button class="menu-btn" id="menuBtn" aria-label="Menu">&#9776;</button>
      <div id="hbar"></div>
    </div>
  </header>
  <main id="view"></main>
  <div class="footwrap" id="foot"></div>
</div>

<div class="scrim" id="scrim"></div>
<nav class="drawer" id="drawer">
  <div class="drawer-h">Calisthenics</div>
  <div class="drawer-sub">Strength &amp; mass</div>
  <button class="navitem" data-tab="train"><span class="ni-ico">&#127947;</span><span>Train</span></button>
  <button class="navitem" data-tab="history"><span class="ni-ico">&#128197;</span><span>History</span></button>
  <button class="navitem" data-tab="stats"><span class="ni-ico">&#128200;</span><span>Progress</span></button>
  <button class="navitem" data-tab="settings"><span class="ni-ico">&#9881;</span><span>Settings</span></button>
  <div class="soon-h">Coming soon</div>
  <button class="navitem" data-tab="pr"><span class="ni-ico">&#127942;</span><span>Personal Records</span><span class="soontag">soon</span></button>
</nav>

<div class="timerbar" id="timerbar">
  <div>
    <div class="tdisplay" id="tdisplay">0:00</div>
    <div class="tsub">rest timer</div>
  </div>
  <div class="tbtns">
    <button class="tbtn" id="tplus">+30s</button>
    <button class="tbtn stop" id="tstop">Skip</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---------- DATA ----------
   Each exercise has an optional bodyweight-load coefficient `bw` (fraction of
   bodyweight the movement loads) and `unit` ("reps" default, or "sec" for holds).
   These drive the estimated-1RM strength math on the Progress tab. Coefficients
   are approximate — the SLOPE of the trend is what matters, not the absolute value. */
const PROGRAM = {
  days: [
    { id:"d1", tag:"Day 1", name:"Push / Pull — Upper A", type:"work",
      desc:"Heavy upper. Low reps, long rest, weighted.",
      exercises:[
        {n:"Weighted Dips", sets:4, reps:"5-8", rest:120, bw:1.0, img:"dip", note:"Add vest once you clear 8 clean reps. Full depth, control the bottom."},
        {n:"Weighted Pull-Ups", sets:4, reps:"5-8", rest:120, bw:1.0, img:"pullup", note:"Dead hang to chin over bar. Add vest as reps climb."},
        {n:"Ring Push-Ups", sets:3, reps:"8-12", rest:90, bw:0.65, note:"Turn rings out at the top. Elevate feet to make harder."},
        {n:"Ring Rows", sets:3, reps:"8-12", rest:90, bw:0.6, note:"Lower your feet to make harder. Chest to rings."},
        {n:"Ring Bicep Curls", sets:3, reps:"10-15", rest:60, bw:0.35, note:"Walk feet forward to add difficulty. Keep elbows still."},
        {n:"Ring Tricep Extensions", sets:3, reps:"10-15", rest:60, bw:0.45, note:"Walk feet back to add difficulty. Lock out at the top."}
      ]},
    { id:"d2", tag:"Day 2", name:"Legs — Squat Focus", type:"work",
      desc:"Knee-dominant. Quads and single-leg strength.",
      exercises:[
        {n:"Box Jumps", sets:4, reps:"3-5", rest:120, bw:0.7, note:"Explosive power — do these first, while fresh. Swing the arms, land soft with bent knees on a knee-height box. Step down, never jump down."},
        {n:"Bulgarian Split Squat", sets:4, reps:"6-10 / leg", rest:120, bw:0.85, img:"squat", note:"Rear foot on a bench. Add vest to load. Main strength move."},
        {n:"Squat Progression", sets:3, reps:"8-12", rest:90, bw:0.6, ladder:"squat", img:"squat", note:"Pick your stage from the ladder. Control the full range."},
        {n:"Step-Ups", sets:3, reps:"10-12 / leg", rest:75, bw:0.7, note:"Knee-height step. Drive through the heel. Add vest."},
        {n:"Wall Sit", sets:3, reps:"30-45 sec", rest:75, bw:0.6, unit:"sec", img:"squat", note:"Thighs parallel. Vest on lap to make harder."},
        {n:"Standing Calf Raises", sets:4, reps:"12-20", rest:60, bw:0.5, note:"On a step for full range. One leg at a time as you progress."},
        {n:"Hanging Knee Raises", sets:3, reps:"10-15", rest:60, bw:0.5, note:"Knee raise station. Slow, no swing."}
      ]},
    { id:"rest", tag:"Day 3", name:"Rest", type:"rest",
      desc:"Walk, mobility, or full rest." },
    { id:"d4", tag:"Day 4", name:"Push / Pull — Upper B", type:"work",
      desc:"Volume upper. Higher reps, shorter rest, new angles.",
      exercises:[
        {n:"Dips", sets:4, reps:"8-12", rest:90, bw:1.0, img:"dip", note:"Bodyweight or light vest. Lean forward slightly for more chest."},

/* ---------- HISTORY RECORDING ---------- */
function snapshotDay(dayId){
  const day=PROGRAM.days.find(d=>d.id===dayId);
  const dd=DB[dayId];
  if(!day||!dd) return null;
  const exercises=[];
  day.exercises.forEach((ex,ei)=>{
    const e=dd[ei];
    if(e && e.sets && e.sets.some(s=>s&&(s.reps||s.wt||s.done))){
      exercises.push({
        n:ex.n, unit:ex.unit||"reps", bw:ex.bw||0, ladder:ex.ladder||null, stage:(e.stage||""),
        sets:e.sets.map(s=> s?{reps:s.reps||"",wt:s.wt||"",done:!!s.done}:{reps:"",wt:"",done:false})
      });
    }
  });
  if(!exercises.length) return null;
  return { tag:day.tag, name:day.name, exercises:exercises, ts:Date.now() };
}
function recordHistory(dayId){
  const tk=todayKey();
  const snap=snapshotDay(dayId);
  if(snap){
    if(!HIST[tk]) HIST[tk]={};
    HIST[tk][dayId]=snap;
  } else if(HIST[tk] && HIST[tk][dayId]){
    delete HIST[tk][dayId];
    if(!Object.keys(HIST[tk]).length) delete HIST[tk];
  }
  saveHist();
}
// Seed history from existing saved sessions (forward-safe: never overwrites real entries)
function seedHistory(){
  let changed=false;
  Object.keys(DB).forEach(dayId=>{
    const day=PROGRAM.days.find(d=>d.id===dayId);
    if(!day) return;
    const dd=DB[dayId];
    const byDate={};
    day.exercises.forEach((ex,ei)=>{
      const e=dd[ei];
      if(e && e.sets && e.sets.some(s=>s&&(s.reps||s.wt||s.done))){
        const dk=e.date||todayKey();
        if(!byDate[dk]) byDate[dk]=[];
        byDate[dk].push({
          n:ex.n, unit:ex.unit||"reps", bw:ex.bw||0, ladder:ex.ladder||null, stage:(e.stage||""),
          sets:e.sets.map(s=> s?{reps:s.reps||"",wt:s.wt||"",done:!!s.done}:{reps:"",wt:"",done:false})
        });
      }
    });
    Object.keys(byDate).forEach(dk=>{
      if(!HIST[dk]) HIST[dk]={};
      if(!HIST[dk][dayId]){
        HIST[dk][dayId]={ tag:day.tag, name:day.name, exercises:byDate[dk], ts:Date.now() };
        changed=true;
      }
    });
  });
  if(changed) saveHist();
}

/* ---------- PROGRESS ---------- */
function exMeta(ex){
  const m=META[ex.n]||{};
  return {
    unit: ex.unit||m.unit||"reps",
    bw: (ex.bw!=null? ex.bw : (m.bw||0)),
    ladder: ex.ladder||m.ladder||null,
    stage: ex.stage||""
  };
}
function e1rmOfSession(ex, bw){
  const m=exMeta(ex);
  const stageF = (m.ladder && m.stage) ? (1 + (Number(m.stage)-1)*0.18) : 1;
  let best=0;
  ex.sets.forEach(s=>{
    const reps=Number(s.reps)||0;
    if(reps<=0) return;
    const vest=Number(s.wt)||0;
    const load=vest + bw*m.bw*stageF;
    const e=load*(1+reps/30);            // Epley estimated 1RM
    if(e>best) best=e;
  });
  return best;
}
function totalReps(ex){ return ex.sets.reduce((a,s)=>a+(Number(s.reps)||0),0); }
function bestReps(ex){ return ex.sets.reduce((mx,s)=>Math.max(mx,Number(s.reps)||0),0); }

function metricValue(ex, metric, bw){
  switch(metric){
    case "e1rm": return Math.round(e1rmOfSession(ex,bw));
    case "volume": return totalReps(ex);
    case "bestset": return bestReps(ex);
    case "besthold": return bestReps(ex);   // seconds live in the reps field
    case "totaltime": return totalReps(ex);
  }
  return 0;
}
function metricUnitLabel(metric){
  return { e1rm:"lb · est. 1RM", volume:"total reps", bestset:"reps · best set",
           besthold:"sec · best hold", totaltime:"sec · total" }[metric] || "";
}
function metricsFor(unit, bwSet){
  if(unit==="sec") return [ {k:"besthold",label:"Best hold"}, {k:"totaltime",label:"Total time"} ];
  const arr=[];
  if(bwSet) arr.push({k:"e1rm",label:"Est. 1RM"});
  arr.push({k:"volume",label:"Total reps"});
  arr.push({k:"bestset",label:"Best set"});
  return arr;
}
function progExercises(){
  const inHist={};
  Object.keys(HIST).forEach(dk=>{ const day=HIST[dk]; Object.keys(day).forEach(id=>{
    day[id].exercises.forEach(ex=>{ inHist[ex.n]=true; }); }); });
  const ordered=[];
  PROGRAM.days.forEach(d=>{ if(d.exercises) d.exercises.forEach(ex=>{
    if(inHist[ex.n] && ordered.indexOf(ex.n)<0) ordered.push(ex.n); }); });
  Object.keys(inHist).forEach(n=>{ if(ordered.indexOf(n)<0) ordered.push(n); });
  return ordered;
}
function exerciseSeries(name){
  const out=[];
  Object.keys(HIST).forEach(dk=>{
    const day=HIST[dk];
    Object.keys(day).forEach(id=>{
      day[id].exercises.forEach(ex=>{ if(ex.n===name) out.push({ dt:parseKey(dk), ex }); });
    });
  });
  out.sort((a,b)=>a.dt-b.dt);
  return out;
}
function fmtNum(n){ n=Number(n); if(!isFinite(n)) return "0"; return String(Math.round(n)); }

function lineChart(vals, labels){
  const W=340,H=180,pL=12,pR=14,pT=18,pB=26;
  const n=vals.length;
  const plotW=W-pL-pR, plotH=H-pT-pB, baseY=pT+plotH;
  let mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
  if(mn===mx){ const pad=Math.abs(mn)*0.1||1; mn-=pad; mx+=pad; }
  const X=i=> n>1 ? pL + i*(plotW/(n-1)) : pL+plotW/2;
  const Y=v=> pT + (1-(v-mn)/(mx-mn))*plotH;
  const pts=vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  let svg=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  svg+=`<line class="ch-grid" x1="${pL}" y1="${baseY.toFixed(1)}" x2="${(pL+plotW).toFixed(1)}" y2="${baseY.toFixed(1)}"/>`;
  if(n>1){
    svg+=`<polygon class="ch-area" points="${X(0).toFixed(1)},${baseY.toFixed(1)} ${pts} ${X(n-1).toFixed(1)},${baseY.toFixed(1)}"/>`;
    svg+=`<polyline class="ch-line" points="${pts}"/>`;
  }
  vals.forEach((v,i)=>{ svg+=`<circle class="ch-dot" cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.2"/>`; });
  svg+=`<text class="ch-lbl" x="${pL}" y="${(pT-6).toFixed(1)}">${fmtNum(mx)}</text>`;
  svg+=`<text class="ch-lbl" x="${pL}" y="${(baseY+12).toFixed(1)}">${labels[0]}</text>`;
  if(n>1) svg+=`<text class="ch-lbl" x="${(pL+plotW).toFixed(1)}" y="${(baseY+12).toFixed(1)}" text-anchor="end">${labels[n-1]}</text>`;
  svg+=`</svg>`;
  return svg;
}

function renderProgress(){
  document.getElementById("hbar").innerHTML =
    '<div class="htitle">Progress</div><div class="hsub">Strength over time</div>';
  const v=document.getElementById("view");
  const names=progExercises();
  if(!names.length){
    v.innerHTML=`<div class="prog-empty"><div class="pico">📈</div>
      Log a few workouts and your strength-progression charts will appear here, one exercise at a time.</div>`;
    return;
  }
  if(!progEx || names.indexOf(progEx)<0) progEx=names[0];
  const m=META[progEx]||{unit:"reps",bw:0,ladder:null};
  const unit=m.unit;
  const bw=Number(SETTINGS.bw||0);
  const bwSet=bw>0;
  const mlist=metricsFor(unit,bwSet);
  if(!progMetric || !mlist.some(x=>x.k===progMetric)) progMetric=mlist[0].k;

  let html=`<select class="progsel" onchange="setProgEx(this.value)">`;
  names.forEach(n=>{ html+=`<option ${n===progEx?"selected":""}>${n}</option>`; });
  html+=`</select><div class="metricrow">`;
  mlist.forEach(x=>{ html+=`<button class="mbtn ${x.k===progMetric?"on":""}" onclick="setProgMetric('${x.k}')">${x.label}</button>`; });
  html+=`</div>`;

  const sessions=exerciseSeries(progEx);
  const vals=[], labels=[];
  sessions.forEach(s=>{ const val=metricValue(s.ex, progMetric, bw); if(val>0){ vals.push(val); labels.push(shortDate(s.dt)); } });

  if(!vals.length){
    html+=`<div class="prog-note">No data for this metric on ${progEx} yet.</div>`;
  } else {
    const latest=vals[vals.length-1], first=vals[0];
    let deltaHtml="";
    if(vals.length>1){
      const d=latest-first, cls=d>0?"up":(d<0?"down":"flat"), arw=d>0?"▲":(d<0?"▼":"—");
      deltaHtml=`<span class="delta ${cls}">${arw} ${fmtNum(Math.abs(d))} since ${labels[0]}</span>`;
    }
    html+=`<div class="chartwrap">
      <div class="progsum"><span class="big">${fmtNum(latest)}</span><span class="unit">${metricUnitLabel(progMetric)}</span>${deltaHtml}</div>`;
    html+=lineChart(vals,labels);
    html+=`<div class="ch-cap">${labels[0]}${labels.length>1?" → "+labels[labels.length-1]:""} · ${vals.length} session${vals.length>1?"s":""}</div></div>`;
  }
  if(unit!=="sec" && !bwSet){
    html+=`<div class="prog-note">Add your bodyweight in <a onclick="goTab('settings')">Settings</a> to unlock the estimated-1RM strength line — most of the load in these lifts is your own bodyweight.</div>`;
  }
  if(m.ladder){
    html+=`<div class="prog-note">This is a progression exercise. Its estimated-1RM score also climbs when you advance a ladder stage, even if your reps reset — so leveling up reads as progress, not a drop.</div>`;
  }
  v.innerHTML=html;
}
function setProgEx(v){ progEx=v; render(); }
function setProgMetric(k){ progMetric=k; render(); }

/* ---------- SETTINGS ---------- */
function renderSettings(){
  document.getElementById("hbar").innerHTML =
    '<div class="htitle">Settings</div><div class="hsub">App preferences</div>';
  const bw=(SETTINGS.bw!=null && SETTINGS.bw!==0)?SETTINGS.bw:"";
  document.getElementById("view").innerHTML=`
    <div class="card"><div class="settings-field">
      <label>Bodyweight</label>
      <div class="bwrow">
        <input class="bwinput" type="number" inputmode="decimal" placeholder="e.g. 175"
               value="${bw}" oninput="setBW(this.value)">
        <span class="bwunit">lb</span>
      </div>
      <div class="hint">Used to estimate your strength (1RM) on the Progress charts — in these lifts most of the load is your own bodyweight. Update it whenever your weight changes.</div>
    </div></div>
    <div class="card"><div class="settings-field">
      <label>Data &amp; backups</label>
      <div class="hint">Your logs live only on this phone. Export a backup file regularly — clearing Safari website data erases everything, and there's no cloud copy by design. Keep the file somewhere safe (Files, email, iCloud Drive); restore it after a wipe or on a new phone.</div>
      <button class="btn btn-g" style="margin-top:12px;" onclick="exportData()">Export backup (.json)</button>
      <button class="btn btn-g" style="margin-top:8px;" onclick="document.getElementById('importFile').click()">Restore from backup…</button>
      <input id="importFile" type="file" accept="application/json,.json" style="display:none" onchange="importData(this)">
      <button class="btn btn-g" style="margin-top:8px;color:var(--warn);" onclick="wipe()">Erase all logged data</button>
    </div></div>`;
}
function setBW(val){ SETTINGS.bw = (val===""?0:Number(val)); saveSettings(); }

/* ---------- BACKUP: EXPORT / IMPORT ---------- */
function pad2(n){ return String(n).padStart(2,"0"); }
function exportData(){
  const payload={ app:"calisthenics", version:1, exportedAt:new Date().toISOString(),
    data:{ log:DB, history:HIST, settings:SETTINGS } };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const d=new Date();
  const fn=`calisthenics-backup-${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}.json`;
  const a=document.createElement("a");
  a.href=url; a.download=fn;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ try{ document.body.removeChild(a); }catch(e){} URL.revokeObjectURL(url); },1200);
  toast("Backup downloaded");
}
function importData(input){
  const file=input.files && input.files[0];
  if(!file){ return; }
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const obj=JSON.parse(e.target.result);
      const d=(obj && obj.data) ? obj.data : obj;   // tolerate a raw dump too
      if(!d || (typeof d.log!=="object" && typeof d.history!=="object")){
        toast("Not a valid backup"); input.value=""; return;
      }
      if(!confirm("Restore this backup? It replaces the logs, history, and settings on this phone.")){
        input.value=""; return;
      }
      DB = d.log || {};
      HIST = d.history || {};
      SETTINGS = d.settings || {};
      saveAll(DB); saveHist(); saveSettings();
      current=null; selDate=null;
      render();
      toast("Backup restored");
    }catch(err){ toast("Couldn't read that file"); }
    input.value="";
  };
  reader.readAsText(file);
}

/* ---------- HELPERS ---------- */
function fmt(sec){ const m=Math.floor(sec/60), s=sec%60; return m?`${m}:${String(s).padStart(2,"0")}`:`${s}s`; }
function go(id){ current=id; window.scrollTo(0,0); render(); }

function ensure(id,ei){
  if(!DB[id]) DB[id]={};
  if(!DB[id][ei]) DB[id][ei]={sets:[],ts:null};
}
function upd(id,ei,s,field,val){
  ensure(id,ei);
  if(!DB[id][ei].sets[s]) DB[id][ei].sets[s]={reps:"",wt:"",done:false};
  DB[id][ei].sets[s][field]=val;
  DB[id][ei].ts=Date.now();
  DB[id][ei].date=todayKey();
  saveAll(DB);
  recordHistory(id);
}
function updStage(id,ei,val){
  ensure(id,ei);
  DB[id][ei].stage=val||"";
  DB[id][ei].ts=Date.now();
  DB[id][ei].date=todayKey();
  saveAll(DB);
  recordHistory(id);
}
function toggleSet(id,ei,s,rest){
  ensure(id,ei);
  if(!DB[id][ei].sets[s]) DB[id][ei].sets[s]={reps:"",wt:"",done:false};
  const now=!DB[id][ei].sets[s].done;
  DB[id][ei].sets[s].done=now;
  DB[id][ei].ts=Date.now();
  DB[id][ei].date=todayKey();
  saveAll(DB);
  recordHistory(id);
  renderDay(id);
  if(now) startTimer(rest);
}
function wasLoggedToday(id){
  if(!DB[id]) return false;
  return Object.values(DB[id]).some(e=>e.date===todayKey() && e.sets && e.sets.some(x=>x&&(x.reps||x.done)));
}
function lastSession(id,ei){
  const e=DB[id]&&DB[id][ei];
  if(!e||!e.sets) return null;
  const done=e.sets.filter(x=>x&&(x.reps||x.wt));
  if(!done.length) return null;
  const parts=done.map(x=> (x.reps||"—")+(x.wt&&x.wt!=="0"?`@${x.wt}lb`:""));
  return parts.join(", ");
}

/* ---------- REST TIMER ---------- */
let tRemain=0, tInt=null;
function startTimer(sec){
  tRemain=sec; showTimer(); paintTimer();
  clearInterval(tInt);
  tInt=setInterval(()=>{
    tRemain--; paintTimer();
    if(tRemain<=0){ clearInterval(tInt); beep(); hapticEnd(); toast("Rest done"); hideTimerSoon(); }
  },1000);
}
function paintTimer(){ document.getElementById("tdisplay").textContent = tRemain>0?fmt(tRemain):"0:00"; }
function showTimer(){ document.getElementById("timerbar").classList.add("show"); }
function hideTimer(){ document.getElementById("timerbar").classList.remove("show"); }
function hideTimerSoon(){ setTimeout(hideTimer,4000); }
document.getElementById("tstop").onclick=()=>{ clearInterval(tInt); hideTimer(); };
document.getElementById("tplus").onclick=()=>{ tRemain+=30; paintTimer(); showTimer(); };

/* ---------- BEEP ---------- */
let AC=null;
function beep(){
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    const tones=[0,0.18,0.36];
    tones.forEach(off=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type="sine"; o.frequency.value=880;
      o.connect(g); g.connect(AC.destination);
      const t=AC.currentTime+off;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.4,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
      o.start(t); o.stop(t+0.16);
    });
  }catch(e){}
}
function hapticEnd(){ if(navigator.vibrate) navigator.vibrate([120,60,120]); }
document.body.addEventListener("touchend",()=>{
  try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==="suspended")AC.resume(); }catch(e){}
},{once:true});

/* ---------- TOAST + WIPE ---------- */
let toastT=null;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1600);
}
function wipe(){
  if(confirm("Erase all logged sets, reps, weights, and workout history? This cannot be undone.")){
    DB={}; saveAll(DB); HIST={}; saveHist(); current=null; selDate=null; render(); toast("All data erased");
  }
}

seedHistory();
render();
